name: 📓 Generate Devlog (A → B)

on:
  workflow_dispatch:
    inputs:
      from_commit:
        description: "Commit bắt đầu — Commit A (excluded)"
        required: true
        type: string
      to_commit:
        description: "Commit kết thúc — Commit B (default: HEAD)"
        required: false
        default: "HEAD"
        type: string

jobs:
  generate-devlog:
    name: Generate Bilingual Devlog
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout (full history)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ─────────────────────────────────────────────
      # 1. Collect git log between A and B
      # ─────────────────────────────────────────────
      - name: 📋 Collect commits
        id: gitlog
        run: |
          FROM="${{ github.event.inputs.from_commit }}"
          TO="${{ github.event.inputs.to_commit }}"

          echo "════════════════════════════════════════"
          echo "  Range: $FROM .. $TO"
          echo "════════════════════════════════════════"

          # Verify commits exist
          git rev-parse --verify "$FROM" > /dev/null 2>&1 || \
            { echo "❌ Commit '$FROM' not found"; exit 1; }
          git rev-parse --verify "$TO" > /dev/null 2>&1 || \
            { echo "❌ Commit '$TO' not found"; exit 1; }

          # Build the log (short hash | subject | author | relative date)
          LOG=$(git log "${FROM}..${TO}" \
            --pretty=format:"%h | %s | %an | %ar" \
            --no-merges)

          if [ -z "$LOG" ]; then
            echo "⚠️  No commits found in range $FROM..$TO"
            exit 1
          fi

          COUNT=$(echo "$LOG" | wc -l | tr -d ' ')
          echo "✅ Found $COUNT commit(s)"
          echo ""
          echo "$LOG"

          # Write to output & temp file (avoids shell-escaping issues)
          echo "$LOG" > /tmp/commits.txt
          {
            echo "log<<__EOF__"
            echo "$LOG"
            echo "__EOF__"
            echo "count=$COUNT"
          } >> "$GITHUB_OUTPUT"

      # ─────────────────────────────────────────────
      # 2. Call Claude API → bilingual devlog
      # ─────────────────────────────────────────────
      - name: 🤖 Generate devlog with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FROM_COMMIT: ${{ github.event.inputs.from_commit }}
          TO_COMMIT: ${{ github.event.inputs.to_commit }}
          COMMIT_COUNT: ${{ steps.gitlog.outputs.count }}
        run: python3 scripts/generate_devlog.py
